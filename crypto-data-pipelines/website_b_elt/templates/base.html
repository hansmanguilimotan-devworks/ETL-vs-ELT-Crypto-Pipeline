<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>{% block title %}ELT Dashboard{% endblock %} · CoinCap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
    />
    <style>
      :root {
        --demo-accent: #93c5fd;
        --demo-panel: #141922;
      }
      body {
        font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(160deg, #0b0f14 0%, #121826 45%, #0d1118 100%);
        min-height: 100vh;
      }
      .navbar-demo {
        background: rgba(10, 14, 22, 0.92) !important;
        border-bottom: 1px solid rgba(147, 197, 253, 0.2);
      }
      .card-panel {
        background-color: var(--demo-panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      .accent {
        color: var(--demo-accent);
      }
      .kpi-value {
        font-size: 1.65rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .badge-pipeline {
        background: rgba(147, 197, 253, 0.12);
        color: var(--demo-accent);
        border: 1px solid rgba(147, 197, 253, 0.35);
      }
      table.dataTable tbody tr {
        background-color: transparent;
      }
    </style>
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-demo mb-4">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">
          <span class="accent">◆</span> Website B — ELT
        </a>
        <span class="navbar-text small text-secondary">
          Extract → Load (staging) → <strong class="text-light">Transform (SQL)</strong>
        </span>
      </div>
    </nav>
    <main class="container pb-5">{% block content %}{% endblock %}</main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
